apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      serviceAccountName: tailscale-sa
      containers:
      - name: langfuse
        image: langfuse/langfuse:2
        imagePullPolicy: Always
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: NEXTAUTH_SECRET
        - name: SALT
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: SALT
        - name: NEXTAUTH_URL
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: NEXTAUTH_URL
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

      - name: ts-sidecar
        image: ghcr.io/tailscale/tailscale:latest
        imagePullPolicy: Always
        env:
        - name: TS_USERSPACE
          value: "true"
        - name: TS_HOSTNAME
          value: "langfuse"
        - name: TS_KUBE_SECRET
          value: "tailscale"
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: tskey
        - name: TS_SERVE_CONFIG
          value: /serve/serve.json
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: tailscale-serve-config
          mountPath: /serve

      volumes:
      - name: tailscale-serve-config
        configMap:
          name: tailscale-serve-config
