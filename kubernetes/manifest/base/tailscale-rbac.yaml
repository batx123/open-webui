apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-sa
  namespace: open-webui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-role
  namespace: open-webui
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["tailscale"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-rb
  namespace: open-webui
subjects:
- kind: ServiceAccount
  name: tailscale-sa
  namespace: open-webui
roleRef:
  kind: Role
  name: tailscale-role
  apiGroup: rbac.authorization.k8s.io
