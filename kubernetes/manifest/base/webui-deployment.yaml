apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui-deployment
  namespace: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      serviceAccountName: tailscale-sa
      containers:
      - name: open-webui
        image: ghcr.io/open-webui/open-webui:main
        env:
        - name: OLLAMA_BASE_URL
          value: "http://<LAN-IP-ollama>:11434"  # Replace with the MetalLB-assigned LAN IP of the ollama LoadBalancer service
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1000m"
            memory: 1Gi
          requests:
            cpu: "500m"
            memory: 500Mi
        tty: true
        volumeMounts:
        - mountPath: /app/backend/data
          name: webui-volume

      - name: ts-sidecar
        image: ghcr.io/tailscale/tailscale:latest
        env:
        - name: TS_USERSPACE
          value: "true"
        - name: TS_HOSTNAME
          value: "openwebui"
        - name: TS_KUBE_SECRET
          value: "tailscale"
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: tskey
        - name: TS_SERVE_CONFIG
          value: /serve/serve.json
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: tailscale-serve-config
          mountPath: /serve

      volumes:
      - name: webui-volume
        persistentVolumeClaim:
          claimName: open-webui-pvc
      - name: tailscale-serve-config
        configMap:
          name: tailscale-serve-config
